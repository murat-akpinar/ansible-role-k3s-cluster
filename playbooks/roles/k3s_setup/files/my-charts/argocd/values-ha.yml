# ArgoCD values for HA setup (3+ masters)
# Master'a SABITLENMEZ: master taint'i tolere edilmedigi icin pod'lar worker'lara
# yerlesir. podAntiAffinity (preferred) ile replikalar mumkunse farkli node'lara dagilir.

# Server configuration
server:
  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argocd-server
            topologyKey: "kubernetes.io/hostname"

# Application Controller configuration
controller:
  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argocd-application-controller
            topologyKey: "kubernetes.io/hostname"

# Repo Server configuration
repoServer:
  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argocd-repo-server
            topologyKey: "kubernetes.io/hostname"

# ApplicationSet Controller configuration
applicationSet:
  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argocd-applicationset-controller
            topologyKey: "kubernetes.io/hostname"

# Configs - ArgoCD configuration parameters
configs:
  params:
    # Insecure mode for ingress (HTTP backend)
    # This allows ArgoCD to work behind ingress with SSL termination
    "server.insecure": "true"

# Redis configuration
redis:
  replicaCount: 2

  # Note: ArgoCD Helm chart does not support Redis persistence
  # Redis runs as Deployment (not StatefulSet), so persistence is not available

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argocd-redis
            topologyKey: "kubernetes.io/hostname"
