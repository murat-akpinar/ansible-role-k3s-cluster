# argocd-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # TLS secret'i (argocd-tls) explicit Certificate kaynagi uretir; ingress tls.secretName ile kullanir.
    # Traefik: yalnizca websecure (443) entrypoint'inde yayinla; backend HTTP (argocd server.insecure=true)
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - argocd.homelab.local
    secretName: argocd-tls
  rules:
  - host: argocd.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80

