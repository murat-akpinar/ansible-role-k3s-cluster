# MetalLB values for HA setup (3+ masters)
# controller: siradan Deployment -> worker'a yerlesir (master taint'ini tolere etmez).
# speaker:    DaemonSet -> HER node'da calismali (master dahil), bu yuzden taint'i TOLERE EDER;
#             yoksa master node'larindaki LoadBalancer servislerinin IP anonsu yapilamaz.

controller:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - metallb
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - controller
            topologyKey: "kubernetes.io/hostname"

speaker:
  # DaemonSet: master dahil tum node'larda calismasi icin taint'i tolere eder.
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Equal"
      value: "system"
      effect: "NoSchedule"
