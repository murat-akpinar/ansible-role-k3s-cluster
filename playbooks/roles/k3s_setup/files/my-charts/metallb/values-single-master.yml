# MetalLB values for single master (non-HA) setup
# controller: siradan Deployment -> worker'a yerlesir (master taint'ini tolere etmez).
# speaker:    DaemonSet -> HER node'da calismali (master dahil), bu yuzden taint'i TOLERE EDER;
#             yoksa master node'larindaki LoadBalancer servislerinin IP anonsu yapilamaz.

controller: {}

speaker:
  # DaemonSet: master dahil tum node'larda calismasi icin taint'i tolere eder.
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Equal"
      value: "system"
      effect: "NoSchedule"
