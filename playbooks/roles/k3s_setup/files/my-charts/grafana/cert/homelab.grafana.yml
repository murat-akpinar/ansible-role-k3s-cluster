# grafana-ingress.yaml
# Updated for kube-prometheus-stack (namespace: monitoring, service: kube-prometheus-stack-grafana)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    # TLS secret'i (grafana-tls) explicit Certificate kaynagi uretir; ingress tls.secretName ile kullanir.
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - grafana.homelab.local
    secretName: grafana-tls
  rules:
  - host: grafana.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kube-prometheus-stack-grafana
            port:
              number: 80