# kube-prometheus-stack values for Single Master setup
# Worker preferred (etcd masterlarini bosaltir) strategy
# Overrides for single master configuration

# Prometheus Configuration
prometheus:
  prometheusSpec:
    # Single Master: 1 replica
    replicas: 1
    
    # Worker preferred (etcd masterlarini bosaltir)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/master
                  operator: DoesNotExist
      # Preferred pod anti-affinity for single master
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - prometheus
              topologyKey: "kubernetes.io/hostname"

# Alertmanager Configuration
alertmanager:
  alertmanagerSpec:
    # Single Master: 1 replica
    replicas: 1
    
    # Worker preferred (etcd masterlarini bosaltir)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/master
                  operator: DoesNotExist
      # Preferred pod anti-affinity for single master
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - alertmanager
              topologyKey: "kubernetes.io/hostname"

# Kube State Metrics
kubeStateMetrics:
  # Worker preferred (etcd masterlarini bosaltir)
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: DoesNotExist

