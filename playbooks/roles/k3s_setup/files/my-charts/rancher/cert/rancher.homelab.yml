apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rancher-ingress
  namespace: cattle-system
  annotations:
    # TLS secret'i (rancher-homelab-tls) explicit Certificate kaynagi uretir; ingress tls.secretName ile kullanir.
    # Traefik: TLS'i Traefik sonlandirir, backend ile HTTP/80 konusur.
    # Rancher, websecure entrypoint'inden gelen X-Forwarded-Proto: https sayesinde
    # redirect yapmaz. (Backend HTTPS/443 + serversscheme=https denenince Traefik
    # rancher'in self-signed sertifikasini dogrulayamayip 500 Internal Server Error verir.)
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - rancher.homelab.local
    secretName: rancher-homelab-tls
  rules:
  - host: rancher.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rancher
            port:
              number: 80

