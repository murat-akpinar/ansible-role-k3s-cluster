# Longhorn values for HA setup (3+ masters)
# Master'a SABITLENMEZ: master taint'i tolere edilmedigi icin Longhorn bilesenleri
# (manager DaemonSet'i dahil) yalnizca worker'larda calisir -> storage replikalari
# worker'lardan saglanir, etcd master'lari disk yukunden korunur.

global:
  # Master toleration'i YOK -> Longhorn master'larda calismaz (worker-only storage).
  tolerations: []
  nodeSelector: {}

# Persistence settings
persistence:
  # HA setup: 3 replicas for high availability
  defaultClassReplicaCount: 3

# CSI component replica counts for HA
csi:
  attacherReplicaCount: 3
  provisionerReplicaCount: 3
  resizerReplicaCount: 3
  snapshotterReplicaCount: 3

# Longhorn Manager (DaemonSet - sadece worker'larda calisir)
longhornManager:
  tolerations: []
  nodeSelector: {}

# Longhorn Driver Deployer
longhornDriver:
  tolerations: []
  nodeSelector: {}

# Longhorn UI
longhornUI:
  replicas: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - longhorn-ui
            topologyKey: "kubernetes.io/hostname"
  nodeSelector: {}
