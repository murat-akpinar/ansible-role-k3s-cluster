# Longhorn values for Single Master setup
# Master'a SABITLENMEZ: master taint'i tolere edilmedigi icin Longhorn bilesenleri
# (manager DaemonSet'i dahil) yalnizca worker'larda calisir -> storage worker'lardan saglanir.
# NOT: Tek master + worker yoksa Longhorn'u calistiracak node kalmaz; bu durumda
# global.tolerations'a master toleration'ini geri eklemen gerekir.

global:
  # Master toleration'i YOK -> Longhorn master'larda calismaz (worker-only storage).
  tolerations: []
  nodeSelector: {}

# Persistence settings
persistence:
  # Single Master setup: 1 replica
  defaultClassReplicaCount: 1

# CSI component replica counts for Single Master
csi:
  attacherReplicaCount: 1
  provisionerReplicaCount: 1
  resizerReplicaCount: 1
  snapshotterReplicaCount: 1

# Longhorn Manager (DaemonSet - sadece worker'larda calisir)
longhornManager:
  tolerations: []
  nodeSelector: {}

# Longhorn Driver Deployer
longhornDriver:
  tolerations: []
  nodeSelector: {}

# Longhorn UI
longhornUI:
  replicas: 1
  nodeSelector: {}
