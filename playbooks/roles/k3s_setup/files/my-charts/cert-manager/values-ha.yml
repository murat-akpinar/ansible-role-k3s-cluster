# Cert-Manager values for HA setup (3+ masters)
# Master'a SABITLENMEZ: master taint'i tolere edilmedigi icin pod'lar worker'lara
# yerlesir. podAntiAffinity (preferred) ile replikalar mumkunse farkli node'lara dagilir.

# Controller
replicaCount: 2

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cert-manager
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - controller
          topologyKey: "kubernetes.io/hostname"

# Webhook
webhook:
  replicaCount: 3

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - cert-manager
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - webhook
            topologyKey: "kubernetes.io/hostname"

# CA Injector
cainjector:
  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - cert-manager
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - cainjector
            topologyKey: "kubernetes.io/hostname"
