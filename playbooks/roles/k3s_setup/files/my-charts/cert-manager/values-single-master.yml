# Cert-Manager values for single master (non-HA) setup
# Master'a SABITLENMEZ: master taint'i tolere edilmedigi icin pod'lar worker'lara yerlesir.
# Tek replika oldugu icin podAntiAffinity'ye gerek yok.

# Controller
replicaCount: 1

# Webhook
webhook:
  replicaCount: 1

# CA Injector
cainjector:
  replicaCount: 1
