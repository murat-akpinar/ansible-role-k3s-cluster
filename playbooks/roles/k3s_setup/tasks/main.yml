# Main tasks for k3s setup
---

# - name: "System requirements Check"
#   ansible.builtin.import_tasks: 00_system_requirements.yml

- name: "Ensure prerequisite packages are installed (acl + Longhorn storage deps)"
  ansible.builtin.package:
    # Paket isimleri OS ailesine gore degisir; ansible.builtin.package paket
    # yoneticisini (apt/dnf/yum) otomatik secer. Bilinmeyen aile Debian'a duser.
    name: "{{ _prereq_packages[ansible_os_family] | default(_prereq_packages['Debian']) }}"
    state: present
  become: true
  vars:
    _prereq_packages:
      Debian:                      # Ubuntu / Debian
        - acl                      # become (unprivileged user) icin; yoksa setfacl hatasi
        - open-iscsi               # Longhorn zorunlu: iSCSI ile volume attach
        - nfs-common               # Longhorn RWX (ReadWriteMany) volume'lari icin
      RedHat:                      # RHEL / Rocky / AlmaLinux
        - acl
        - iscsi-initiator-utils    # open-iscsi'nin RHEL karsiligi
        - nfs-utils                # nfs-common'in RHEL karsiligi

- name: "Ensure iscsid service is enabled and running (Longhorn icin)"
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  become: true

- name: "Configure Hostname"
  ansible.builtin.import_tasks: 01_configure_hostname.yml

- name: "Install and Configure keepalived"
  ansible.builtin.import_tasks: 02_install_keepalived.yml

- name: "Install k3s"
  ansible.builtin.import_tasks: 03_install_k3s.yml

# Merkezi "API hazir mi" kapisi: k3s kurulumundan sonra, Helm/kubectl kullanan
# tum rollerden (cert-manager, longhorn, grafana, rancher, argocd...) once calisir.
# HA/etcd isinma veya apiserver restart penceresinde olusan 503 / connection refused
# hatalarini burada bir kez bekleyerek onler. Roller artik kendi beklemelerini icermez.
- name: "Wait for Kubernetes API server to be ready"
  ansible.builtin.command:
    cmd: kubectl get --raw=/readyz
  register: k8s_api_ready
  until: k8s_api_ready.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  failed_when: false
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - "'master' in group_names"
    - inventory_hostname == groups['master'][0]

- name: "Fail if Kubernetes API server did not become ready"
  ansible.builtin.fail:
    msg: >-
      Kubernetes API sunucusu beklenen surede ({{ 30 * 10 }} sn) hazir olmadi
      (son cikti: {{ k8s_api_ready.stdout | default('') }}{{ k8s_api_ready.stderr | default('') }}).
      Sonraki kurulum adimlari durduruldu.
  when:
    - "'master' in group_names"
    - inventory_hostname == groups['master'][0]
    - k8s_api_ready.rc != 0

- name: "Wellcome Message"
  ansible.builtin.import_tasks: 00_wellcome.yml


- name: "Install Helm"
  ansible.builtin.import_tasks: 04_install_helm.yml
  when: helm_install | default(false)
  tags: ['helm']

# Ingress: k3s gomulu Traefik kullanilir (ayri kurulum task'i yok).

- name: "Install Metallb"
  ansible.builtin.import_tasks: 06_metallb_install.yml
  when: metallb_install | default(false)
  tags: ['metallb']

- name: "Install Cert-Manager"
  ansible.builtin.import_tasks: 07_cert_manager_install.yml
  when: cert_manager_install | default(false)
  tags: ['cert-manager']

- name: "Install Longhorn"
  ansible.builtin.import_tasks: 08_longhorn_install.yml
  when: longhorn_install | default(false)
  tags: ['longhorn']

- name: "Install Grafana"
  ansible.builtin.import_tasks: 09_grafana_install.yml
  when: grafana_install | default(false)
  tags: ['grafana', 'monitoring']

- name: "Install Rancher"
  ansible.builtin.import_tasks: 10_rancher_install.yml
  when: rancher_install | default(false)
  tags: ['rancher']

- name: "Install ArgoCD"
  ansible.builtin.import_tasks: 11_argocd_install.yml
  when: argocd_install | default(false)
  tags: ['argocd']

- name: "Display Installation Results" 
  ansible.builtin.import_tasks: 99_result.yml
