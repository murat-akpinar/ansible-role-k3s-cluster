---
# ============================================================================
# verify.yml — K3s post-install HEALTH CHECK checklist
# ============================================================================
# Read-only checks only (makes no changes; every task is changed_when: false).
# Run it after installation to confirm the cluster is healthy.
#
# Usage:
#   ansible-playbook -i inventory/cluster_inventory.yml verify.yml
#
# What it checks:
#   - k3s / k3s-agent service is active on every node
#   - All nodes are Ready
#   - All pods are Running/Succeeded
#   - Keepalived VIP is reachable
#   - Pod health of each enabled component namespace
#   - Traefik LoadBalancer IP is assigned
#
# Note: kubectl runs as root using /etc/rancher/k3s/k3s.yaml (mode 644), so no
# privilege drop to an unprivileged user is needed. If k3s is not installed yet,
# the cluster checks are skipped with a clear message instead of failing.
# ============================================================================

# ----------------------------------------------------------------------------
# 1) Node level: is the k3s/k3s-agent systemd service active?
# ----------------------------------------------------------------------------
- name: Node level service checks
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Determine expected k3s service name
      set_fact:
        k3s_service_name: "{{ 'k3s' if 'master' in group_names else 'k3s-agent' }}"

    - name: Check the k3s service status
      command: "systemctl is-active {{ k3s_service_name }}"
      register: k3s_service_status
      changed_when: false
      failed_when: false

    - name: Report service status
      debug:
        msg: >-
          {{ '[OK]  ' if k3s_service_status.stdout == 'active' else '[FAIL]' }}
          {{ inventory_hostname }} — {{ k3s_service_name }}:
          {{ k3s_service_status.stdout | default('unknown') }}

# ----------------------------------------------------------------------------
# 2) Cluster level: kubectl checks on the first master only (run as root)
# ----------------------------------------------------------------------------
- name: Cluster level health checks
  hosts: master
  become: true
  gather_facts: false
  vars_files:
    - playbooks/roles/k3s_setup/vars/main.yml
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Run cluster checks on the first master only
      when: inventory_hostname == groups['master'][0]
      block:
        - name: Check whether the k3s kubeconfig exists
          ansible.builtin.stat:
            path: "{{ kubeconfig_path }}"
          register: kubeconfig_stat

        - name: Report that k3s is not installed yet
          debug:
            msg: >-
              k3s kubeconfig not found at {{ kubeconfig_path }} — k3s does not
              appear to be installed yet. Run k3s_setup.yml first, then re-run
              this health check. Skipping cluster checks.
          when: not kubeconfig_stat.stat.exists

        # --- kubectl-based checks (root + KUBECONFIG, only if k3s is installed) ---
        - name: Cluster checks
          when: kubeconfig_stat.stat.exists
          environment:
            KUBECONFIG: "{{ kubeconfig_path }}"
          vars:
            components:
              - { name: "Ingress (Traefik)",        ns: "kube-system",    selector: "app.kubernetes.io/name=traefik", enabled: true }
              - { name: "MetalLB",                  ns: "metallb-system", enabled: "{{ metallb_install | default(false) }}" }
              - { name: "cert-manager",             ns: "cert-manager",   enabled: "{{ cert_manager_install | default(false) }}" }
              - { name: "Longhorn",                 ns: "longhorn-system", enabled: "{{ longhorn_install | default(false) }}" }
              - { name: "Monitoring / Grafana",     ns: "monitoring",     enabled: "{{ grafana_install | default(false) }}" }
              - { name: "Rancher",                  ns: "cattle-system",  enabled: "{{ rancher_install | default(false) }}" }
              - { name: "ArgoCD",                   ns: "argocd",         enabled: "{{ argocd_install | default(false) }}" }
          block:
            - name: Check Keepalived VIP reachability
              command: "ping -c 2 -W 2 {{ keepalived_vip }}"
              register: vip_ping
              changed_when: false
              failed_when: false

            - name: Count nodes that are not Ready
              shell: 'kubectl get nodes --no-headers | grep -v " Ready " | wc -l'
              register: not_ready_nodes
              changed_when: false
              failed_when: false

            - name: Count total nodes
              shell: "kubectl get nodes --no-headers | wc -l"
              register: total_nodes
              changed_when: false
              failed_when: false

            - name: Count pods that are not Running (all namespaces)
              shell: >
                kubectl get pods -A
                --field-selector=status.phase!=Running,status.phase!=Succeeded
                --no-headers 2>/dev/null | wc -l
              register: not_running_pods
              changed_when: false
              failed_when: false

            - name: Get the Traefik LoadBalancer IP
              command: >
                kubectl get svc -n kube-system traefik
                -o jsonpath={.status.loadBalancer.ingress[0].ip}
              register: ingress_lb_ip
              changed_when: false
              failed_when: false

            - name: Check pod health for each enabled component namespace
              shell: >
                kubectl get pods -n {{ item.ns }}
                {{ ('-l ' ~ item.selector) if (item.selector | default('')) else '' }}
                --field-selector=status.phase!=Running,status.phase!=Succeeded
                --no-headers 2>/dev/null | wc -l
              loop: "{{ components | selectattr('enabled') | list }}"
              loop_control:
                label: "{{ item.name }}"
              register: component_health
              changed_when: false
              failed_when: false

            # --- Assemble the checklist ---
            - name: Build component checklist lines
              set_fact:
                component_lines: >-
                  {{ component_lines | default([]) + [
                       ('[OK]   ' if (item.stdout | int == 0) else '[FAIL] ')
                       ~ item.item.name ~ ' (ns: ' ~ item.item.ns ~ ') — not-running pods: ' ~ item.stdout
                     ] }}
              loop: "{{ component_health.results | default([]) }}"
              loop_control:
                label: "{{ item.item.name }}"

            - name: Build checklist header and cluster lines
              set_fact:
                report_lines:
                  - "======================================================================"
                  - "                K3s CLUSTER HEALTH CHECK (verify.yml)"
                  - "======================================================================"
                  - "{{ ('[OK]  ' if (not_ready_nodes.stdout | int == 0) else '[FAIL]') ~ ' Nodes Ready       — not-ready: ' ~ (not_ready_nodes.stdout | trim) ~ ' / total: ' ~ (total_nodes.stdout | trim) }}"
                  - "{{ ('[OK]  ' if (not_running_pods.stdout | int == 0) else '[FAIL]') ~ ' Pods Running      — not-running: ' ~ (not_running_pods.stdout | trim) }}"
                  - "{{ ('[OK]  ' if (vip_ping.rc == 0) else '[FAIL]') ~ ' Keepalived VIP    — ' ~ keepalived_vip }}"

            - name: Append component lines
              set_fact:
                report_lines: "{{ report_lines + (component_lines | default([])) }}"

            - name: Append Traefik LoadBalancer IP line
              set_fact:
                report_lines: "{{ report_lines + ['Traefik LB IP     — ' ~ ((ingress_lb_ip.stdout | default('') | trim) | default('N/A (not assigned)', true))] }}"

            - name: Append checklist footer
              set_fact:
                report_lines: "{{ report_lines + [
                    '======================================================================',
                    ('RESULT: ALL CHECKS PASSED' if overall_ok else 'RESULT: SOME CHECKS FAILED — review the [FAIL] lines above'),
                    '======================================================================'
                  ] }}"
              vars:
                overall_ok: "{{ (not_ready_nodes.stdout | int == 0)
                                and (not_running_pods.stdout | int == 0)
                                and (vip_ping.rc == 0)
                                and ((component_health.results | default([]) | map(attribute='stdout') | map('int') | sum) == 0) }}"

            - name: Print the health check checklist
              debug:
                msg: "{{ report_lines }}"
